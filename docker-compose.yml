version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: ds-mall-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ds_mall
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ds-mall-mysql-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./data.sql:/docker-entrypoint-initdb.d/02-data.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.2
    container_name: ds-mall-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ds-mall-redis-data:/data

volumes:
  ds-mall-mysql-data:
  ds-mall-redis-data:
